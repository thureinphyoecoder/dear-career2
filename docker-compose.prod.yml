services:
  dear_career_db:
    image: postgres:16-alpine
    container_name: dear_career_db_prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dear_career_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dear_career_backend_prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - dear_career_media:/app/media
      - dear_career_static:/app/staticfiles
    depends_on:
      dear_career_db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dear_career_frontend_prod
    restart: unless-stopped
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend
    command: >
      npm run dev -- --hostname 0.0.0.0 --port 3000

  nginx:
    image: nginx:1.27-alpine
    container_name: dear_career_nginx_prod
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/dear-career.conf:/etc/nginx/conf.d/default.conf:ro
      - dear_career_media:/var/www/media:ro
      - dear_career_static:/var/www/static:ro

volumes:
  dear_career_postgres_prod_data:
  dear_career_media:
  dear_career_static:
