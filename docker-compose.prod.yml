services:
  dear_career_db:
    image: postgres:16-alpine
    container_name: dear_career_db_prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dear_career_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dear_career_backend_prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - dear_career_media:/app/media
      - dear_career_static:/app/staticfiles
    depends_on:
      dear_career_db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dear_career_frontend_prod
    restart: unless-stopped
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend
    command: >
      npm run dev -- --hostname 0.0.0.0 --port 3000

  caddy:
    image: caddy:2.10-alpine
    container_name: dear_career_caddy_prod
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - dear_career_media:/srv/media:ro
      - dear_career_static:/srv/static:ro
      - dear_career_caddy_data:/data
      - dear_career_caddy_config:/config

volumes:
  dear_career_postgres_prod_data:
  dear_career_media:
  dear_career_static:
  dear_career_caddy_data:
  dear_career_caddy_config:
