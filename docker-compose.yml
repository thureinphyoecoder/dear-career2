services:
  dear_career_db:
    image: postgres:16-alpine
    container_name: dear_career_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dear_career_db
      POSTGRES_USER: dear_career_user
      POSTGRES_PASSWORD: dear_career_password
    ports:
      - "55433:5432"
    volumes:
      - dear_career_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dear_career_user -d dear_career_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dear_career_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      dear_career_db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8000), timeout=2); s.close()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    command: >
      sh -c "python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dear_career_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.docker
      - ./frontend/.env.local
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000/api"
      DJANGO_ADMIN_API_BASE_URL: "http://backend:8000/api"
      NEXT_PUBLIC_DJANGO_ADMIN_URL: "http://localhost:8000/admin/"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  dear_career_postgres_data:
  frontend_node_modules:
  frontend_next:
